  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <rect x="80" y="60" width="1040" height="510" rx="36" fill="none" stroke="#d8b363" stroke-opacity="0.42" stroke-width="2"/>
  <rect x="190" y="110" width="820" height="410" rx="28" fill="url(#panel)" stroke="#c89a45" stroke-width="2"/>

  <text x="600" y="205" text-anchor="middle" fill="#7a4a23" font-family="Playfair Display, Georgia, serif" font-size="34" letter-spacing="3">WEDDING INVITATION</text>
  <text x="600" y="290" text-anchor="middle" fill="#6a1d2a" font-family="Playfair Display, Georgia, serif" font-size="62">Dhanush  and  Keerthana</text>
  <text x="600" y="350" text-anchor="middle" fill="#3b2518" font-family="Cormorant Garamond, Georgia, serif" font-size="34">Monday, 4 May 2026  |  9:35 AM</text>
  <text x="600" y="406" text-anchor="middle" fill="#1f5742" font-family="Cormorant Garamond, Georgia, serif" font-size="30">Sri Jyothinandamayi Samudaya Bhavan</text>
  <text x="600" y="474" text-anchor="middle" fill="#7a4a23" font-family="Cormorant Garamond, Georgia, serif" font-size="27">With blessings, we invite you to celebrate with us.</text>
