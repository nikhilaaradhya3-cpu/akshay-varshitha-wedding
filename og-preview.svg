<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Wedding invitation preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1310"/>
      <stop offset="55%" stop-color="#3a261f"/>
      <stop offset="100%" stop-color="#5b3b2f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="#f3d9a0" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#f3d9a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff6e6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f5ddb2" stop-opacity="0.92"/>
    </linearGradient>
